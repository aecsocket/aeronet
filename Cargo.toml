[workspace]
members = ["crates/*", "examples/*"]
resolver = "2"

[workspace.package]
authors = ["aecsocket <aecsocket@tutanota.com>"]
categories = ["game-development", "network-programming"]
edition = "2021"
keywords = ["gamedev", "network", "bevy"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/aecsocket/aeronet"
rust-version = "1.82.0"

[workspace.lints.rust]
missing_docs = "warn"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(fuzzing)'] }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

alloc_instead_of_core = "warn"
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
unwrap_used = "warn"

module_name_repetitions = "allow"
needless_pass_by_value = "allow"
similar_names = "allow"
too_many_arguments = "allow"
type_complexity = "allow"

[workspace.dependencies]
# aeronet
# core
aeronet = { version = "0.12.0", path = "crates/aeronet" }
aeronet_io = { version = "0.12.0", path = "crates/aeronet_io" }
aeronet_transport = { version = "0.12.0", path = "crates/aeronet_transport" }

# io
aeronet_websocket = { version = "0.12.0", path = "crates/aeronet_websocket" }
aeronet_webtransport = { version = "0.12.0", path = "crates/aeronet_webtransport" }

# integration
aeronet_replicon = { version = "0.12.0", path = "crates/aeronet_replicon" }

# generic

ahash = "0.8"
anyhow = { version = "1.0", default-features = false }
arbitrary = { version = "1.3", features = ["derive"] }
base64 = "0.22"
bitvec = "1.0"
bytes = { version = "1.10", default-features = false }
cfg-if = "1.0"
clap = { version = "4.5", features = ["derive"] }
derive_more = { version = "2.0", default-features = false }
document-features = "0.2"
egui_plot = "0.30"
either = "1.13"
futures = "0.3"
itertools = "0.14"
octs = "1.0"
oneshot = "0.1"
rand = "0.9"
replace_with = "0.1"
ringbuf = "0.4"
serde = { version = "1.0", features = ["derive"] }
size_format = "1.0"
sync_wrapper = "1.0"
thousands = "0.2"
tracing = { version = "0.1", default-features = false }
typesize = "0.1"
web-time = "1.1"

# native

tokio = "1.39"

# wasm

gloo-timers = "0.3"
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = "0.3"

# bevy

bevy = { version = "0.15", default-features = false }
bevy_app = { version = "0.15", default-features = false }
bevy_core = { version = "0.15", default-features = false }
bevy_derive = { version = "0.15", default-features = false }
bevy_ecs = { version = "0.15", default-features = false }
bevy_hierarchy = { version = "0.15", default-features = false }
bevy_reflect = { version = "0.15", default-features = false }
bevy_time = { version = "0.15", default-features = false }
bevy_winit = { version = "0.15", default-features = false }

bevy_egui = "0.32"

# tls

rustls = "0.23"
rustls-native-certs = "0.8"
tokio-rustls = "0.26"

# aeronet_channel

flume = "0.11"

# aeronet_steam

# bevy-steamworks = "0.12"
# steamworks = "0.11"

# aeronet_websocket

rcgen = "0.13"
tokio-tungstenite = "0.26"

# aeronet_webtransport
# core
xwt-core = "0.6"

# native
spki = "0.7"
wtransport = "0.5"
x509-cert = "0.2"
xwt-wtransport = "0.13"

# wasm
xwt-web = "0.15"

# aeronet_replicon

bevy_replicon = { version = "0.30", default-features = false }
